
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin sửa gói</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0b132b;color:#fff}
    .wrap{max-width:900px;margin:auto;padding:20px}
    .card{background:#1c2541;padding:18px;border-radius:12px;margin:14px 0}
    input,textarea{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #ccc;box-sizing:border-box}
    button{padding:12px 16px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
    .primary{background:gold;color:#000}
    .secondary{background:#fff;color:#000}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .hidden{display:none}
    @media (max-width:768px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card" id="loginBox">
    <h2>Đăng nhập admin</h2>
    <input type="password" id="password" placeholder="Nhập mật khẩu admin">
    <button class="primary" onclick="login()">Vào admin</button>
  </div>

  <div id="adminBox" class="hidden">
    <div class="card">
      <h2>Sửa thông tin gói</h2>
      <div id="list"></div>
      <button class="primary" onclick="saveAll()">Lưu lên server</button>
      <button class="secondary" onclick="loadData()">Tải lại dữ liệu</button>
    </div>
  </div>
</div>

<script>
let adminPassword = "";
let packages = [];

async function fetchJson(url, options = {}){
  const res = await fetch(url, options);
  const data = await res.json().catch(() => ({}));
  if(!res.ok) throw new Error(data.error || 'Lỗi yêu cầu');
  return data;
}

async function login(){
  const password = document.getElementById('password').value;
  try{
    await fetchJson('/api/admin/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password })
    });
    adminPassword = password;
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('adminBox').classList.remove('hidden');
    loadData();
  }catch(err){
    alert(err.message);
  }
}

async function loadData(){
  packages = await fetchJson('/api/packages');
  render();
}

function render(){
  const html = packages.map((p, i) => `
    <div class="card">
      <div class="row">
        <div>
          <label>Tên gói</label>
          <input value="${p.name || ''}" oninput="updateField(${i}, 'name', this.value)">
        </div>
        <div>
          <label>Giá</label>
          <input value="${p.price || ''}" oninput="updateField(${i}, 'price', this.value)">
        </div>
      </div>
      <div>
        <label>Mô tả</label>
        <input value="${p.desc || ''}" oninput="updateField(${i}, 'desc', this.value)">
      </div>
      <div>
        <label>Text nút</label>
        <input value="${p.button || ''}" oninput="updateField(${i}, 'button', this.value)">
      </div>
    </div>
  `).join('');
  document.getElementById('list').innerHTML = html;
}

function updateField(index, key, value){
  packages[index][key] = value;
}

async function saveAll(){
  try{
    await fetchJson('/api/admin/packages', {
      method:'PUT',
      headers:{
        'Content-Type':'application/json',
        'x-admin-password': adminPassword
      },
      body: JSON.stringify(packages)
    });
    alert('Đã lưu lên server');
  }catch(err){
    alert(err.message);
  }
}
</script>
</body>
</html>
